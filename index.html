<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=./1.0静态页面/office.html">
    <title>智慧消防驾驶舱 - 跳转中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #070E1A;
            color: #E8F4FF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loading {
            text-align: center;
        }
        .loading::before {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 3px solid rgba(175,82,222,.2);
            border-top-color: #AF52DE;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p { font-size: 14px; color: rgba(232,244,255,.6); }
    </style>
</head>
<body>
    <div class="loading">
        <p>正在进入智慧消防驾驶舱...</p>
    </div>
    <script>
        // 备用跳转（如果 meta refresh 失效）
        setTimeout(function() {
            window.location.href = './1.0静态页面/office.html';
        }, 100);
    </script>
</body>
</html>
